<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>环球英语学习</title>
  <style>
    :root {
      --primary: #4F46E5;
      --p2: #7C3AED;
      --secondary: #10B981;
      --accent: #F59E0B;
      --danger: #EF4444;
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-light: #64748B;
      --border: #E2E8F0;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    /* ===== HEADER ===== */
    .hdr {
      background:linear-gradient(135deg,#4F46E5,#7C3AED);
      color:#fff; padding:18px 20px 56px;
    }
    .hdr-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .hdr-title { font-size:19px; font-weight:800; }
    .streak-badge {
      background:rgba(255,255,255,.2); border-radius:20px;
      padding:5px 13px; font-size:12px; font-weight:600;
      display:flex; align-items:center; gap:4px; cursor:pointer;
    }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat-card { background:rgba(255,255,255,.15); border-radius:12px; padding:10px 8px; text-align:center; }
    .stat-num { font-size:20px; font-weight:900; }
    .stat-lbl { font-size:10px; opacity:.8; margin-top:1px; }

    /* Streak dots */
    .streak-bar { display:flex; gap:3px; justify-content:center; margin-top:10px; }
    .sdot { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:rgba(255,255,255,.5); }
    .sdot.done { background:var(--accent); border-color:var(--accent); color:#fff; }
    .sdot.today { border-color:#fff; color:#fff; }

    /* ===== MAIN BODY ===== */
    .body-wrap { margin-top:-38px; padding:0 14px 90px; }

    /* ===== TAB BAR ===== */
    .tabbar { display:flex; background:var(--card); border-radius:14px; padding:5px; gap:3px; box-shadow:0 2px 12px rgba(0,0,0,.08); margin-bottom:14px; }
    .tabbtn { flex:1; padding:9px 4px; border:none; background:transparent; border-radius:10px; font-size:12px; font-weight:700; color:var(--text-light); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; transition:all .2s; }
    .tabbtn .ico { font-size:18px; }
    .tabbtn.active { background:var(--primary); color:#fff; }

    /* ===== PANELS ===== */
    .panel { display:none; }
    .panel.active { display:block; animation:fadeUp .25s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ===== CATEGORY CARDS ===== */
    .cgrid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .ccard {
      background:var(--card); border-radius:15px; padding:16px 13px;
      box-shadow:0 2px 8px rgba(0,0,0,.05); cursor:pointer;
      border:2px solid transparent; transition:all .2s;
    }
    .ccard:active { transform:scale(.96); }
    .ccard.sel { border-color:var(--primary); }
    .ci { font-size:30px; margin-bottom:7px; }
    .cn { font-weight:700; font-size:13px; line-height:1.3; }
    .ccnt { font-size:11px; color:var(--text-light); margin-top:3px; }
    .cprog { margin-top:8px; height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
    .cprog-bar { height:100%; background:var(--primary); border-radius:4px; transition:width .5s; }

    /* ===== LEVEL FILTER ===== */
    .lvl-row { display:flex; gap:7px; margin-bottom:12px; flex-wrap:wrap; }
    .lvl-chip { padding:5px 13px; border-radius:20px; border:2px solid var(--border); background:#fff; font-size:12px; font-weight:600; color:var(--text-light); cursor:pointer; transition:all .2s; }
    .lvl-chip.sel { background:var(--primary); border-color:var(--primary); color:#fff; }
    .lvl-chip:active { transform:scale(.95); }

    /* ===== SCENE LIST ===== */
    .scene-card {
      background:var(--card); border-radius:14px; padding:14px 15px; margin-bottom:10px;
      box-shadow:0 2px 6px rgba(0,0,0,.05); cursor:pointer;
      border:2px solid transparent; transition:all .2s;
    }
    .scene-card:active { transform:scale(.98); }
    .scene-card.mst { border-color:var(--secondary); }
    .scene-card.prc { border-color:var(--accent); }
    .sh { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .stitle { font-weight:700; font-size:14px; }
    .sbadge { font-size:10px; padding:3px 9px; border-radius:10px; font-weight:600; }
    .sbdg-mst { background:#D1FAE5; color:#065F46; }
    .sbdg-prc { background:#FEF3C7; color:#92400E; }
    .sbdg-new { background:#EEF2FF; color:#4338CA; }
    .sdesc { font-size:12px; color:var(--text-light); }

    /* ===== PRACTICE CARD ===== */
    .pcard { background:var(--card); border-radius:18px; padding:20px 16px; box-shadow:0 4px 18px rgba(0,0,0,.07); margin-bottom:14px; }
    .pcat { font-size:11px; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .plen { font-size:12px; color:var(--text-light); margin-bottom:12px; }
    .pphrase { background:#F1F5F9; border-radius:12px; padding:13px 14px; margin-bottom:8px; border-left:4px solid var(--primary); }
    .pp-cn { font-size:14px; font-weight:600; margin-bottom:5px; }
    .pp-en { font-size:16px; color:var(--primary); font-weight:700; line-height:1.4; }
    .pp-hint { font-size:11px; color:#94A3B8; margin-top:5px; font-style:italic; }
    .spkbtn {
      display:inline-flex; align-items:center; gap:5px;
      background:var(--primary); color:#fff; border:none;
      border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600;
      cursor:pointer; margin-top:7px;
    }
    .spkbtn:active { opacity:.8; transform:scale(.96); }

    /* ===== RECORD ===== */
    .rec-wrap { text-align:center; margin:10px 0; }
    .recbtn { width:54px; height:54px; border-radius:50%; background:linear-gradient(135deg,var(--danger),#DC2626); border:none; color:#fff; font-size:20px; cursor:pointer; box-shadow:0 4px 12px rgba(239,68,68,.3); transition:all .2s; }
    .recbtn.on { animation:rpulse 1s infinite; }
    @keyframes rpulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
    .recbtn:active { transform:scale(.92); }
    .reclbl { font-size:11px; color:var(--text-light); margin-top:5px; }
    .recst { font-size:11px; color:var(--text-light); margin-top:3px; min-height:16px; }

    /* ===== PROGRESS ===== */
    .pg-wrap { display:flex; align-items:center; gap:8px; margin:12px 0; }
    .pg-bar { flex:1; height:7px; background:var(--border); border-radius:7px; overflow:hidden; }
    .pg-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:7px; transition:width .4s; }
    .pg-txt { font-size:11px; color:var(--text-light); white-space:nowrap; }

    /* ===== BUTTONS ===== */
    .btn1 { width:100%; padding:15px; background:linear-gradient(135deg,var(--primary),var(--p2)); color:#fff; border:none; border-radius:13px; font-size:15px; font-weight:700; cursor:pointer; }
    .btn1:active { opacity:.85; transform:scale(.98); }
    .btn2 { width:100%; padding:13px; background:#fff; color:var(--primary); border:2px solid var(--primary); border-radius:13px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
    .btn2:active { background:#EEF2FF; transform:scale(.98); }
    .btn3 { display:inline-flex; align-items:center; gap:5px; background:none; border:none; color:var(--text-light); font-size:13px; cursor:pointer; padding:8px 0; margin-bottom:10px; }
    .btn3:active { color:var(--primary); }

    /* ===== TIP CARD ===== */
    .tip { background:#FEF9EF; border-radius:12px; padding:12px 14px; border-left:4px solid var(--accent); margin:10px 0; }
    .tip-t { font-weight:700; font-size:12px; margin-bottom:3px; }
    .tip-b { font-size:11px; color:#92400E; }

    /* ===== QUIZ ===== */
    .qcard { background:var(--card); border-radius:18px; padding:20px 16px; box-shadow:0 4px 18px rgba(0,0,0,.07); margin-bottom:14px; text-align:center; }
    .qask { font-size:13px; color:var(--text-light); margin-bottom:8px; }
    .qcn { font-size:19px; font-weight:800; margin-bottom:14px; }
    .qopts { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    .qopt { padding:13px 10px; border:2px solid var(--border); border-radius:11px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; text-align:center; transition:all .2s; word-break:break-word; }
    .qopt:active { transform:scale(.97); }
    .qopt.crt { border-color:var(--secondary); background:#D1FAE5; }
    .qopt.wrg { border-color:var(--danger); background:#FEE2E2; }

    /* ===== ENCOURAGEMENT ===== */
    .enc { background:#EEF2FF; border-radius:13px; padding:12px 14px; text-align:center; font-size:13px; font-weight:700; color:var(--primary); margin:10px 0; display:none; }
    .enc.show { display:block; animation:fadeUp .3s; }

    /* ===== SCORE PANEL ===== */
    .score-p { background:linear-gradient(135deg,#4F46E5,#7C3AED); border-radius:18px; padding:22px 20px; color:#fff; text-align:center; margin-bottom:16px; }
    .score-n { font-size:60px; font-weight:900; line-height:1; }
    .score-l { font-size:13px; opacity:.8; margin-top:3px; }
    .score-bd { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px; }
    .score-bi {}
    .score-bin { font-size:22px; font-weight:900; }
    .score-bil { font-size:10px; opacity:.7; }

    /* ===== ACHIEVEMENTS ===== */
    .achgrid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    .achcard { background:var(--card); border-radius:13px; padding:13px 10px; text-align:center; opacity:.4; transition:all .2s; }
    .achcard.on { opacity:1; border:2px solid var(--accent); }
    .achicon { font-size:26px; margin-bottom:4px; }
    .achname { font-size:12px; font-weight:700; }
    .achdesc { font-size:10px; color:var(--text-light); margin-top:2px; }

    /* ===== MODAL ===== */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; padding:20px; }
    .modal-bg.on { display:flex; animation:fadeUp .2s; }
    .modal { background:#fff; border-radius:22px; padding:28px 22px; width:100%; max-width:340px; text-align:center; }
    .memoji { font-size:52px; margin-bottom:10px; }
    .mtitle { font-size:20px; font-weight:900; margin-bottom:5px; }
    .mmain { font-size:38px; font-weight:900; color:var(--primary); }
    .msub { font-size:13px; color:var(--text-light); margin:6px 0 18px; }
    .mstars { font-size:26px; margin-bottom:6px; }

    /* ===== TOAST ===== */
    #toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--primary); color:#fff; padding:10px 22px; border-radius:24px; font-weight:700; font-size:13px; z-index:9999; transition:transform .4s cubic-bezier(.175,.885,.32,1.275); display:flex; align-items:center; gap:6px; white-space:nowrap; }
    #toast.on { transform:translateX(-50%) translateY(0); }

    /* ===== CONFETTI ===== */
    #conf { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9998; }

    /* ===== STATS VIEW ===== */
    .statd { background:var(--card); border-radius:15px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .statr { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--border); }
    .statr:last-child { border-bottom:none; }
    .statrl { font-size:13px; color:var(--text-light); }
    .statrv { font-size:17px; font-weight:800; color:var(--primary); }
    .rstbtn { margin-top:14px; background:none; border:2px solid var(--border); border-radius:10px; padding:10px; width:100%; font-size:12px; color:var(--text-light); cursor:pointer; }
    .rstbtn:active { background:var(--bg); }

    /* ===== BACK BTN ===== */
    .bk { background:none; border:none; color:var(--text-light); font-size:13px; cursor:pointer; padding:8px 0; margin-bottom:10px; display:flex; align-items:center; gap:5px; }
    .bk:active { color:var(--primary); }

    /* ===== CULTURE CARDS ===== */
    .culture-card { background:var(--card); border-radius:15px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.05); cursor:pointer; transition:all .2s; }
    .culture-card:active { transform:scale(.98); }
    .culture-emoji { font-size:36px; margin-bottom:8px; }
    .culture-title { font-weight:700; font-size:15px; margin-bottom:4px; }
    .culture-desc { font-size:12px; color:var(--text-light); line-height:1.5; }
    .culture-tag { display:inline-block; padding:3px 10px; border-radius:10px; font-size:10px; font-weight:600; margin-top:6px; }
    .tag-uk { background:#FEF3C7; color:#92400E; }
    .tag-us { background:#DBEAFE; color:#1E40AF; }
    .tag-sg { background:#FCE7F3; color:#9D174D; }
    .tag-my { background:#FEF9C3; color:#854D0E; }
    .tag-th { background:#D1FAE5; color:#065F46; }

    /* ===== SONG SECTION ===== */
    .song-card { background:linear-gradient(135deg,#1E1B4B,#312E81); border-radius:18px; padding:18px 16px; margin-bottom:14px; color:#fff; }
    .song-tag { display:inline-block; background:rgba(255,255,255,.2); border-radius:20px; padding:3px 12px; font-size:10px; font-weight:700; margin-bottom:8px; }
    .song-title { font-size:17px; font-weight:800; margin-bottom:2px; }
    .song-artist { font-size:12px; opacity:.7; margin-bottom:10px; }
    .song-line { background:rgba(255,255,255,.12); border-radius:10px; padding:11px 13px; margin-bottom:7px; border-left:3px solid #818CF8; }
    .song-l-cn { font-size:11px; opacity:.7; margin-bottom:3px; }
    .song-l-en { font-size:15px; font-weight:700; line-height:1.4; }

    /* ===== SECTION TITLE ===== */
    .stitle-wrap { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .stitle-main { font-size:15px; font-weight:800; }

    /* ===== DIFFICULTY BADGE ===== */
    .diff { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
    .diff-e { background:#D1FAE5; color:#065F46; }
    .diff-m { background:#FEF3C7; color:#92400E; }
    .diff-h { background:#FEE2E2; color:#991B1B; }

    /* ===== TYPE INPUT ===== */
    .qinput { width:100%; padding:13px 14px; border:2px solid var(--border); border-radius:11px; font-size:15px; outline:none; text-align:center; transition:border-color .2s; }
    .qinput:focus { border-color:var(--primary); }
    .qinput.crt { border-color:var(--secondary); background:#D1FAE5; }
    .qinput.wrg { border-color:var(--danger); background:#FEE2E2; }

    /* ===== LISTEN PAGE ===== */
    .listen-hero { background:linear-gradient(135deg,#4F46E5,#7C3AED); border-radius:18px; padding:24px 18px; color:#fff; margin-bottom:16px; text-align:center; }
    .listen-hero h2 { font-size:20px; font-weight:900; margin-bottom:4px; }
    .listen-hero p { font-size:13px; opacity:.8; }
    .listen-lyric { background:#fff; border-radius:14px; padding:16px; margin-bottom:10px; border-left:4px solid #818CF8; }
    .listen-l-en { font-size:17px; font-weight:700; color:var(--primary); line-height:1.5; margin-bottom:4px; }
    .listen-l-cn { font-size:12px; color:var(--text-light); font-style:italic; }
    .listen-ctrl { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    .lplay-btn { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#4F46E5,#7C3AED); border:none; color:#fff; font-size:26px; cursor:pointer; box-shadow:0 4px 16px rgba(79,70,229,.4); display:flex; align-items:center; justify-content:center; }
    .lplay-btn:active { transform:scale(.93); }
    .lplay-btn.playing { animation:spk 1.5s infinite; }
    @keyframes spk { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    /* ===== EMPTY ===== */
    .empty { text-align:center; padding:48px 20px; }
    .empty-ico { font-size:52px; margin-bottom:10px; }
    .empty-t { font-size:16px; font-weight:700; margin-bottom:5px; }
    .empty-s { font-size:13px; color:var(--text-light); }

    /* ===== CULTURE DETAIL ===== */
    .cult-detail { background:var(--card); border-radius:18px; padding:20px 16px; margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .cult-flag { font-size:40px; margin-bottom:8px; }
    .cult-hdr { font-size:19px; font-weight:900; margin-bottom:4px; }
    .cult-sub { font-size:12px; color:var(--text-light); margin-bottom:14px; }
    .cult-secs { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
    .cult-sec { background:#F1F5F9; border-radius:8px; padding:7px 12px; font-size:11px; font-weight:600; }
    .cult-section { margin-bottom:14px; }
    .cult-section-title { font-size:13px; font-weight:800; margin-bottom:6px; color:var(--primary); display:flex; align-items:center; gap:5px; }
    .cult-section p { font-size:13px; color:var(--text-light); line-height:1.7; }
    .cult-phrase { background:#F1F5F9; border-radius:10px; padding:10px 13px; margin-bottom:7px; border-left:3px solid var(--primary); }
    .cult-ph-c { font-size:11px; color:var(--text-light); margin-bottom:2px; }
    .cult-ph-e { font-size:14px; font-weight:700; color:var(--primary); }

    /* ===== PROGRESS BAR TOP ===== */
    .top-bar { height:3px; background:var(--border); margin-bottom:0; }
    .top-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); transition:width .4s; }
  </style>
</head>
<body>

<canvas id="conf"></canvas>
<div id="toast">🎉</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">🌍 环球英语学习</div>
    <div class="streak-badge" onclick="goStats()">🔥 <span id="sk">0</span>天</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="tt-score">0</div><div class="stat-lbl">总积分</div></div>
    <div class="stat-card"><div class="stat-num" id="tt-words">0</div><div class="stat-lbl">已掌握</div></div>
    <div class="stat-card"><div class="stat-num" id="tt-today">0</div><div class="stat-lbl">今日</div></div>
  </div>
  <div class="streak-bar" id="sbar"></div>
</div>

<!-- BODY -->
<div class="body-wrap">

  <!-- TOP PROGRESS -->
  <div class="top-bar"><div class="top-fill" id="top-fill" style="width:0%"></div></div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tabbtn active" id="tab-learn" onclick="switchTab('learn')">
      <span class="ico">📖</span>学习
    </button>
    <button class="tabbtn" id="tab-quiz" onclick="switchTab('quiz')">
      <span class="ico">✍️</span>练习
    </button>
    <button class="tabbtn" id="tab-song" onclick="switchTab('song')">
      <span class="ico">🎵</span>听歌学
    </button>
    <button class="tabbtn" id="tab-ach" onclick="switchTab('ach')">
      <span class="ico">🏆</span>成就
    </button>
  </div>

  <!-- ===== LEARN PANEL ===== -->
  <div class="panel active" id="p-learn">
    <div class="stitle-wrap">
      <div class="stitle-main">📚 选择国家</div>
    </div>
    <div class="lvl-row" id="country-row">
      <button class="lvl-chip sel" onclick="setCountry('ALL',this)">🌍 全部</button>
      <button class="lvl-chip" onclick="setCountry('UK',this)">🇬🇧 英国</button>
      <button class="lvl-chip" onclick="setCountry('US',this)">🇺🇸 美国</button>
      <button class="lvl-chip" onclick="setCountry('SG',this)">🇸🇬 新加坡</button>
      <button class="lvl-chip" onclick="setCountry('MY',this)">🇲🇾 马来西亚</button>
      <button class="lvl-chip" onclick="setCountry('TH',this)">🇹🇭 泰国</button>
    </div>
    <div id="cat-area"></div>
  </div>

  <!-- ===== QUIZ PANEL ===== -->
  <div class="panel" id="p-quiz">
    <div id="quiz-area"></div>
  </div>

  <!-- ===== SONG PANEL ===== -->
  <div class="panel" id="p-song">
    <div id="song-area"></div>
  </div>

  <!-- ===== ACHIEVEMENT PANEL ===== -->
  <div class="panel" id="p-ach">
    <div id="ach-area"></div>
  </div>

</div>

<!-- ===== SUB VIEWS ===== -->
<!-- Country List -->
<div id="v-countries" style="display:none;padding:16px 14px;">
  <button class="bk" onclick="rv('main')">← 返回</button>
  <div class="stitle-wrap"><div class="stitle-main" id="ct-title">🇬🇧 英国</div></div>
  <div class="lvl-row" id="ct-lvl"></div>
  <div id="ct-scenes"></div>

let S = {
  country: 'ALL',
  lvl: 'ALL',
  practicedToday: new Set(),
  mastered: new Set(),
  streak: 0,
  lastDate: '',
  totalScore: 0,
  history: {},
  quizQueue: [],
  quizIdx: 0,
  quizScore: 0,
  pracQueue: [],
  pracIdx: 0,
  tab: 'learn',
};

function loadS() {
  try {
    const d = JSON.parse(localStorage.getItem('world_eng_v2')||'{}');
    S = { ...S, ...d };
    S.mastered = new Set(d.mastered||[]);
    S.practicedToday = new Set(d.practicedToday||[]);
    if (S.lastDate !== getToday()) S.practicedToday = new Set();
    if (S.lastDate !== getToday()) S.streak = (S.lastDate===yesterday()) ? S.streak : 0;
  } catch(e) {}
}

function saveS() {
  try {
    localStorage.setItem('world_eng_v2', JSON.stringify({
      ...S,
      mastered: Array.from(S.mastered),
      practicedToday: Array.from(S.practicedToday),
      lastDate: getToday(),
    }));
  } catch(e) {}
}

function getToday() { return new Date().toISOString().split('T')[0]; }
function yesterday() { return new Date(Date.now()-86400000).toISOString().split('T')[0]; }

// ============================================================
// HEADER UPDATE
// ============================================================
function updateHdr() {
  document.getElementById('sk').textContent = S.streak;
  document.getElementById('tt-score').textContent = S.totalScore;
  document.getElementById('tt-words').textContent = S.mastered.size;
  document.getElementById('tt-today').textContent = S.practicedToday.size;
  renderStreakBar();
  updateTopBar();
}

function renderStreakBar() {
  const bar = document.getElementById('sbar');
  const today = new Date().getDay()||7;
  let h = '';
  for (let i=6;i>=0;i--) {
    const d = (today-i+7)%7+1;
    const num = new Date(Date.now()-i*86400000).getDate();
    const done = i < S.streak || (i===0 && S.practicedToday.size>0);
    h += `<div class="sdot ${done?'done':''} ${i===0?'today':''}">${num}</div>`;
  }
  bar.innerHTML = h;
}

function updateTopBar() {
  const total = getTotalPhrases();
  const pct = total > 0 ? Math.round(S.mastered.size/total*100) : 0;
  document.getElementById('top-fill').style.width = pct+'%';
}

function getTotalPhrases() {
  let n = 0;
  Object.values(DATA).forEach(k => {
    if (k.sections) k.sections.forEach(s => s.scenes.forEach(sc => n += sc.phrases.length));
  });
  return n;
}

      html += `

        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function markKnown() {
  const p = S.pracQueue[S.pracIdx];
  S.mastered.add(p.e);
  S.practicedToday.add(p.e);
  if (!S.history[p.e]) S.history[p.e] = {c:0,t:0};
  S.history[p.e].c++; S.history[p.e].t++;
  S.totalScore += 10;
  S.pracIdx++;
  checkAch();
  saveS();
  updateHdr();
  renderPracPhrase();
}

function endPrac() {
  if (S.pracIdx > 0) {
    S.lastDate = getToday();
    saveS();
    updateHdr();
  }
  document.getElementById('v-practice').style.display = 'none';
  switchTab('learn');
  const score = Math.min(S.pracIdx, S.pracQueue.length) * 10;
  if (score > 0) {
    showModal('👍', '学习完成！', '本轮+' + score + '分，继续加油！', '+' + score, '⭐');
  }
}

let recOn = false;
let mediaRecorder = null;

function toggleRec() {
  const btn = document.getElementById('recbtn');
  const st = document.getElementById('recst');
  if (recOn) {
    if (mediaRecorder) mediaRecorder.stop();
    btn.classList.remove('on'); recOn = false;
    st.textContent = '🎤 录音已停止';
    return;
  }
  navigator.mediaDevices?.getUserMedia({audio:true}).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    const chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      st.textContent = '🎉 录音完成！' + (chunks.length ? '已保存' : '');
    };
    mediaRecorder.start();
    btn.classList.add('on'); recOn = true;
    st.textContent = '🔴 录音中...';
  }).catch(() => { st.textContent = '⚠️ 请允许麦克风权限'; });
}

function startQuiz() {
  let all = [];
  Object.values(DATA).forEach(d => {
    if (d.sections) d.sections.forEach(s => s.scenes.forEach(sc => sc.phrases.forEach(p => all.push(p))));
  });
  S.quizQueue = shuffle([...all]).slice(0,10);
  S.quizIdx = 0; S.quizScore = 0;
  document.getElementById('v-quiz').style.display = 'block';
  renderQuizQ();
}

function renderQuizQ() {
  if (S.quizIdx >= S.quizQueue.length) { endQuiz(); return; }
  const q = S.quizQueue[S.quizIdx];
  const pct = Math.round(S.quizIdx/S.quizQueue.length*100);
  const wrongOpts = getWrong(q.e, 3);
  const opts = shuffle([{e:q.e},{e:wrongOpts[0]},{e:wrongOpts[1]},{e:wrongOpts[2]}]);
  const isType = Math.random() > 0.5;

  const area = document.getElementById('qz-area');
  area.innerHTML = `
    <div class="pg-wrap">
      <div class="pg-bar"><div class="pg-fill" style="width:${pct}%"></div></div>
      <div class="pg-txt">${S.quizIdx+1}/${S.quizQueue.length}</div>
    </div>
    <div class="qcard">
      <div class="qask">请选择正确的英文</div>
      <div class="qcn">${q.c}</div>
      <div class="qopts" id="qopts">
        ${opts.map(o=>`<button class="qopt" onclick="checkAns(this,'${o.e.replace(/'/g,"\\'")}','${q.e.replace(/'/g,"\\'")}')">${o.e}</button>`).join('')}
      </div>
      <button class="btn2" style="margin-top:12px" onclick="speak('${q.e.replace(/'/g,"\\'")}')">🔊 听发音</button>
    </div>`;
}

function checkAns(btn, sel, correct) {
  document.querySelectorAll('.qopt').forEach(o => o.style.pointerEvents='none');
  if (sel === correct) {
    btn.classList.add('crt');
    S.quizScore += 10;
    speak(correct);
    showToast('✅ 正确！+10分');
    setTimeout(()=>{S.quizIdx++;renderQuizQ()},1000);
  } else {
    btn.classList.add('wrg');
    document.querySelectorAll('.qopt').forEach(o => { if(o.textContent===correct) o.classList.add('crt'); });
    speak(correct);
    showToast('❌ '+correct);
    setTimeout(()=>{S.quizIdx++;renderQuizQ()},1800);
  }
}

function endQuiz() {
  const score = S.quizScore;
  const total = S.quizQueue.length * 10;
  const pct = score/total;
  const stars = pct>=0.9?3:pct>=0.6?2:1;
  const msgs = [{emoji:'💪',title:'继续加油！',sub:'熟能生巧，多练多进步！'},{emoji:'👍',title:'不错！',sub:`答对${score/10}题，得${score}分！`},{emoji:'🎉',title:'满分通关！',sub:'你是英语达人！'}];
  const m = msgs[stars-1];
  S.totalScore += score;
  saveS(); updateHdr();
  if (stars===3) confetti();

  const lvlT = song.lvl==='e'?'初级':song.lvl==='m'?'中级':'高级';

    <div class="song-card">
      <div class="song-tag">${flag} ${lvlT}</div>

function playSong() {

// ============================================================
// TTS
// ============================================================
function speak(text) {
  if (!window.speechSynthesis) { showToast('⚠️ 浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(x=>x.lang==='en-US'&&x.name.toLowerCase().includes('female')) || voices.find(x=>x.lang==='en-US') || voices[0];
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ============================================================
// CONFETTI
// ============================================================
function confetti() {
  const cvs = document.getElementById('conf');
  const ctx = cvs.getContext('2d');
  cvs.width = innerWidth; cvs.height = innerHeight;
  const ps = [];
  const cols = ['#4F46E5','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4'];
  for (let i=0;i<100;i++) {
    ps.push({x:Math.random()*cvs.width,y:-20-Math.random()*200,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,c:cols[Math.floor(Math.random()*cols.length)],s:Math.random()*8+4,r:Math.random()*360,rv:(Math.random()-.5)*10});
  }
  let fr = 0;
  function draw() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    ps.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.r+=p.rv; p.vy+=.1;
    });
    fr++;
    if (fr<120) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cvs.width,cvs.height);
  }
  draw();
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function getWrong(correct, n) {
  let all = [];
  Object.values(DATA).forEach(d => { if(d.sections) d.sections.forEach(s=>s.scenes.forEach(sc=>sc.phrases.forEach(p=>all.push(p.e)))); });
  return shuffle(all.filter(e=>e!==correct)).slice(0,n);
}
function checkAch() {
  const achs = getAch();
  const prev = achs.filter(a=>a.on);
  setTimeout(()=>{
    const now = getAch().filter(a=>a.on);
    const newA = now.find((a,i)=>!prev[i]?.on);
    if (newA) showToast('🎉 成就解锁：'+newA.icon+' '+newA.name);
  },100);
}

  S.country = code;
  document.querySelectorAll('#country-row .lvl-chip').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel');
  renderLearn();
}
